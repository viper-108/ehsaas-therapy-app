# Cache-bust: 2026-04-23 — force Railway to fully rebuild dist/
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
  "rm -rf node_modules server/node_modules",
  "npm install --include=dev",
  "npm install --prefix server"
]

[phases.build]
cmds = [
  "rm -rf dist",
  "npx vite build"
]

[start]
cmd = "node server/server.js"

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/ehsaas-logo.png" />
    <link rel="apple-touch-icon" href="/ehsaas-logo.png" />
    <title>Ehsaas Therapy Centre</title>
    <meta name="description" content="Ehsaas Therapy Centre — Find the right psychologist for your mental wellness journey. Professional, confidential, and accessible therapy." />
    <meta name="author" content="Ehsaas Therapy Centre" />

    <meta property="og:title" content="Ehsaas Therapy Centre" />
    <meta property="og:description" content="Find the right psychologist for your mental wellness journey. Professional, confidential, and accessible therapy." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/ehsaas-logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/ehsaas-logo.png" />

    <!-- Apply saved theme BEFORE React renders so new tabs (public profile, etc.) -->
    <!-- pick up dark/light mode without a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('ehsaas_theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = saved === 'dark' || (!saved && prefersDark);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
